;
; CH552G Keyboard — PlatformIO Build Configuration
;
; Targets:
;   pio run -e board          Build firmware
;   pio run -e board -t upload  Upload firmware
;   pio run -e app            Build Windows configurator app
;

[env:board]
platform = https://github.com/JAQUBA/JQB_CH55XPlatform.git
board = ch552g
framework = arduino

build_src_filter =
    -<*>
    +<board/>
    +<board/userUsbHidKeyboard/>

[env:app]
platform = native
lib_deps =
    https://github.com/JAQUBA/JQB_WindowsLib.git
build_flags =
    -Isrc/shared
    -Isrc/app
build_src_filter =
    -<*>
    +<app/>