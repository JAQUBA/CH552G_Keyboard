;
; CH552G Keyboard — PlatformIO Build Configuration
;
; Targets:
;   pio run -e board          Build firmware
;   pio run -e board -t upload  Upload firmware
;   pio run -e app            Build Windows configurator app
;

[env:board]
platform = https://github.com/JAQUBA/JQB_CH55XPlatform.git
board = ch552g
framework = arduino

; USB auto-configured from board defaults (usb_ram=148):
;   -DUSER_USB_RAM=148, -DEP0_ADDR=0, -DEP1_ADDR=10, -DEP2_ADDR=20
;   --xram-loc 148, --xram-size 876
; Override: board_build.usb_ram = <value>

; WS2812 library auto-detected from #include <WS2812.h>
; Include paths for src/ subdirs (shared/) added automatically

build_src_filter =
    -<*>
    +<board/>
    +<board/userUsbHidKeyboard/>

[env:app]
platform = native
lib_deps =
    https://github.com/JAQUBA/JQB_WindowsLib.git
build_flags =
    -Isrc/shared
    -Isrc/app
build_src_filter =
    -<*>
    +<app/>